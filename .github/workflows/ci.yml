name: Product Cover Upload Function CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Platform.ProductCoverUpload.Function.csproj

      - name: Build
        run: dotnet build Platform.ProductCoverUpload.Function.csproj --configuration Release --no-restore

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish Platform.ProductCoverUpload.Function.csproj --configuration Release --runtime linux-x64 --self-contained false --output publish

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: fa-product-cover-upload
          package: publish
          sku: flexconsumption
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
